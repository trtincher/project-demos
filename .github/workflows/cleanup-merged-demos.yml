name: Cleanup merged PR demos

# Triggered via repository_dispatch from private repos,
# or manually via workflow_dispatch
on:
  repository_dispatch:
    types: [pr-merged]
  workflow_dispatch:
    inputs:
      project:
        description: 'Project folder name (e.g., dndapp)'
        required: true
      pr_number:
        description: 'PR number (e.g., 19)'
        required: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine demo folder
        id: folder
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            PROJECT="${{ github.event.client_payload.project }}"
            PR_NUM="${{ github.event.client_payload.pr_number }}"
          else
            PROJECT="${{ inputs.project }}"
            PR_NUM="${{ inputs.pr_number }}"
          fi
          # Find the matching folder (pr-{N}-*)
          MATCH=$(find "${PROJECT}" -maxdepth 1 -type d -name "pr-${PR_NUM}-*" | head -1)
          echo "project=${PROJECT}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "folder=${MATCH}" >> "$GITHUB_OUTPUT"

      - name: Delete demo folder
        if: steps.folder.outputs.folder != ''
        run: |
          echo "Removing ${{ steps.folder.outputs.folder }}"
          rm -rf "${{ steps.folder.outputs.folder }}"

      - name: Update root index.html
        if: steps.folder.outputs.folder != ''
        run: |
          FOLDER="${{ steps.folder.outputs.folder }}"
          # Remove the demo entry from index.html (the <div> containing the folder link)
          python3 -c "
          import re
          with open('index.html', 'r') as f:
              content = f.read()
          # Remove the demo div that links to this folder
          pattern = r'<div class=\"demo\">.*?href=\"' + re.escape(FOLDER) + r'/\".*?</div>'
          content = re.sub(pattern, '', content, flags=re.DOTALL)
          with open('index.html', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        if: steps.folder.outputs.folder != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "cleanup: remove demo for ${{ steps.folder.outputs.project }} PR #${{ steps.folder.outputs.pr_number }} (merged)"
          git push
