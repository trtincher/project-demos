name: Cleanup merged PR demos

# Self-cleaning: runs daily and on-demand.
# Scans all demo folders, checks if the corresponding PR is merged,
# and deletes demos for merged PRs. Zero per-repo setup required.
#
# Folder convention: {project}/pr-{N}-{slug}/
# Repo mapping:      project-repos.json maps folder names → GitHub repos

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch: {}   # Manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan and cleanup merged demos
        env:
          GH_TOKEN: ${{ secrets.DEMO_CLEANUP_TOKEN }}
        run: |
          set -e

          # Load project → repo mapping
          if [ ! -f project-repos.json ]; then
            echo "No project-repos.json found, skipping"
            exit 0
          fi

          CLEANED=0

          # Find all demo folders matching the pr-{N}-* pattern
          for demo_dir in */pr-*/; do
            [ -d "$demo_dir" ] || continue

            # Extract project name and PR number from path
            PROJECT=$(echo "$demo_dir" | cut -d'/' -f1)
            PR_FOLDER=$(echo "$demo_dir" | cut -d'/' -f2)
            PR_NUM=$(echo "$PR_FOLDER" | sed 's/pr-\([0-9]*\)-.*/\1/')

            if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "$PR_FOLDER" ]; then
              echo "Skipping $demo_dir — can't parse PR number"
              continue
            fi

            # Look up the GitHub repo for this project
            REPO=$(python3 -c "
          import json
          with open('project-repos.json') as f:
              mapping = json.load(f)
          print(mapping.get('$PROJECT', ''))
          ")

            if [ -z "$REPO" ]; then
              echo "Skipping $demo_dir — no repo mapping for '$PROJECT'"
              continue
            fi

            # Check if PR is merged
            PR_STATE=$(gh pr view "$PR_NUM" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")

            if [ "$PR_STATE" = "MERGED" ]; then
              echo "PR #$PR_NUM in $REPO is merged — removing $demo_dir"
              rm -rf "$demo_dir"

              # Remove entry from index.html
              python3 -c "
          import re
          with open('index.html', 'r') as f:
              content = f.read()
          pattern = r'<div class=\"demo\">.*?href=\"$(echo "$demo_dir" | sed 's/\//\\\//g')\".*?</div>'
          content = re.sub(pattern, '', content, flags=re.DOTALL)
          with open('index.html', 'w') as f:
              f.write(content)
          "
              CLEANED=$((CLEANED + 1))
            else
              echo "PR #$PR_NUM in $REPO is $PR_STATE — keeping $demo_dir"
            fi
          done

          if [ "$CLEANED" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup: remove $CLEANED demo(s) for merged PRs"
            git push
            echo "Cleaned up $CLEANED demo(s)"
          else
            echo "No merged demos to clean up"
          fi
